services:
  db:
    image: postgis/postgis:16-3.4
    container_name: geocolleges_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: geocolleges
      POSTGRES_PASSWORD: geocolleges
      POSTGRES_DB: geocolleges
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geocolleges"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: geocolleges_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://geocolleges:geocolleges@db:5432/geocolleges
      SECRET_KEY: change-me-in-production-please
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SEED_ADMIN_EMAIL: admin@geocolleges.cm
      SEED_ADMIN_PASSWORD: Admin123!
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./database:/app/database
      - ./scripts:/app/scripts
    command: >
      sh -c "
        python /app/scripts/seed_admin.py &&
        python /app/scripts/import_csv.py --csv /app/database/donne_es_att_be_ri.csv &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

  frontend:
    build: ./frontend
    container_name: geocolleges_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  adminer:
    image: adminer:latest
    container_name: geocolleges_adminer
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"

volumes:
  db_data:
